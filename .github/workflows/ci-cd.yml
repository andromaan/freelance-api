name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Verify Docker is available
        run: docker info

      - name: Restore dependencies
        run: dotnet restore FreelanceBack.sln

      - name: Build
        run: dotnet build FreelanceBack.sln --no-restore -c Release

      - name: Test
        run: dotnet test FreelanceBack.sln --no-build -c Release --verbosity normal --logger trx --results-directory ./test-results
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
      
      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results
          path: ./test-results/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test results artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results/

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Публікуємо image тільки при push (не для PR)
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
