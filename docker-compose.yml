services:
  db:
    image: postgres:16
    container_name: freelance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelance-db-docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    # image: ghcr.io/andromaan/freelance-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freelance-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Server=db;Port=5432;Database=freelance-db-docker;User Id=postgres;Password=postgres;"
      GoogleAuthSettings__ClientId: ${GOOGLE_CLIENT_ID}
      AuthSettings__key: ${JWT_KEY}
      AuthSettings__issuer: ${JWT_ISSUER}
      AuthSettings__audience: ${JWT_AUDIENCE}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - db
    volumes:
      - images_data:/app/wwwroot/images

volumes:
  postgres_data:
  images_data:

